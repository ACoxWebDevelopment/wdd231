    <main>
        <h1 id="current"></h1>

                    <form method="GET" action="mineralthankyou.html" class="designOne">

                <label>First Name <input type="text" name="first" required autocomplete="given-name"
                        title="Your First Name"></label>
                <label>Last Name <input type="text" name="last" required autocomplete="family-name"
                        title="Your Last Name"></label>
               
                <label>Email <input type="email" name="email" required placeholder="john89@gmail.com" title="Your Email"
                        autocomplete="email"></label>
                <label>Cell Phone <input type="tel" name="phone" required title="A Phone Number with dashes"
                        autocomplete="tel" placeholder="406-555-1234"></label>




                            <input type="hidden" name="timestamp" id="timestamp" value="">

                <label>
                    Comments or Feedback
                    <textarea name="description" title="Comments or Feedback"></textarea>
                </label>


                <label><input type="submit" value="Apply for Membership"></label>
            </form>
